<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Home</title>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- google fonts - geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- tailwind css + daisy ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body class="bg-[#64748b0c]">
    <!-- navbar section starts -->
    <header>
      <div class="navbar shadow-sm px-14 py-2">
        <div class="flex flex-1 items-center">
          <img class="w-8" src="./assets/github-logo.png" alt="Github Logo" />
          <a class="btn btn-ghost text-[#1F2937] font-semibold text-xl"
            >GitHub Issues Tracker</a
          >
        </div>
        <div class="flex gap-2">
          <div class="relative">
            <i
              class="fa-solid fa-magnifying-glass absolute z-10 top-3 left-2 text-[#64748B]"
            ></i
            ><input
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto pl-8 text-base"
            />
          </div>
          <div class="">
            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
          </div>
        </div>
      </div>
    </header>

    <main>
        <!-- tab section starts -->
    </main>

    <script src="./js/main.js"></script>
  </body>
</html>
