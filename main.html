<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Home</title>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- google fonts - geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- tailwind css + daisy ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body class="bg-[#64748b2e] h-dvh">
    <!-- navbar section starts -->
    <header>
      <div class="navbar shadow-sm px-14 py-2">
        <div class="flex flex-1 items-center">
          <img class="w-8" src="./assets/github-logo.png" alt="Github Logo" />
          <a class="btn btn-ghost text-[#1F2937] font-semibold text-xl"
            >GitHub Issues Tracker</a
          >
        </div>
        <div class="flex gap-2">
          <div class="relative">
            <i
              class="fa-solid fa-magnifying-glass absolute z-10 top-3 left-2 text-[#64748B]"
            ></i
            ><input
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto pl-8 text-base"
            />
          </div>
          <div class="">
            <button class="btn btn-primary">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class=" max-w-5xl mx-auto">
      <!-- tab section starts -->
      <div class=" mt-14 bg-white w-full p-6 rounded-lg mb-4">
        <button onclick="toggleButton('all-tab')" id="all-tab" class="btn btn-primary">All</button>
        <button onclick="toggleButton('open-tab')" id="open-tab" class="btn btn-outline">Open</button>
        <button onclick="toggleButton('close-tab')" id="close-tab" class="btn btn-outline">Closed</button>
      </div>

      <div class="bg-white p-6 rounded-lg">
          <!-- issues number section starts -->
        <div class="flex justify-between items-center">
            <div class="issues-left flex justify-between items-center">
                <img class="bg-[#ECE4FF] p-2 rounded-full" src="./assets/Aperture.png" alt="Aperture">
                <div class="ml-2">
                    <h2 class=" text-[#1F2937] text-xl font-semibold">50 Issues</h2>
                    <p class="text-base text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="issues-right flex justify-between items-center">
                <div class="bg-[#00A96E] w-2 h-2 rounded-full mr-2"></div><p class="text-base text-[#1F2937] font-medium">Open</p>
                <div class="bg-[#A855F7] w-2 h-2 rounded-full mx-2"></div><p class="text-base text-[#1F2937] font-medium">Closed</p>
            </div>
        </div>
      </div>
    </main>

    <script src="./js/main.js"></script>
  </body>
</html>
